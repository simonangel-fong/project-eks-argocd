apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: 02-platform-capabilities
  namespace: argocd
  labels:
    scope: platform
    capability: bootstrap
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - argocd.argoproj.io/resources-finalizer
spec:
  project: default
  source:
    repoURL: https://github.com/simonangel-fong/eks-multi-tenant-cluster
    targetRevision: master
    path: argocd/platform-capabilities
    directory:
      recurse: true
      exclude: '*/*/*.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  ignoreDifferences:
    - group: argoproj.io
      kind: Application
      jsonPointers:
        - /spec/source/directory
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
