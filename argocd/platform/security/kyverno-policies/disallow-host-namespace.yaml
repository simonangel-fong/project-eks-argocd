apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-host-namespace
  annotations:
    policies.kyverno.io/title: Disallow host namespaces
    policies.kyverno.io/category: Pod Security
    policies.kyverno.io/description: >-
      Sharing the host's network, PID, or IPC namespace breaks pod isolation
      and can leak sensitive information. Reserved for platform infrastructure.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: disallow-host-namespace
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - karpenter
                - istio-system
                - istio-ingress
                - cert-manager
                - argocd
                - external-dns
                - external-secrets
                - monitoring
                - kyverno
                - argo-rollouts
      validate:
        message: "hostNetwork, hostPID, and hostIPC are not allowed."
        pattern:
          spec:
            =(hostNetwork): "false"
            =(hostPID): "false"
            =(hostIPC): "false"
