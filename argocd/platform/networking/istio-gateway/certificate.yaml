apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: arguswatcher-net-wildcard
  namespace: istio-ingress
spec:
  secretName: arguswatcher-net-wildcard-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: arguswatcher.net
  dnsNames:
    - arguswatcher.net
    - "*.arguswatcher.net"
