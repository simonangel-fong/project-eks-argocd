apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-external-dns
  namespace: argocd
  labels:
    scope: platform
    capability: networking
  annotations:
    argocd.argoproj.io/sync-wave: "-11"
  finalizers:
    - argocd.argoproj.io/resources-finalizer
spec:
  project: platform
  source:
    repoURL: https://kubernetes-sigs.github.io/external-dns
    chart: external-dns
    targetRevision: 1.15.0
    helm:
      releaseName: external-dns
      values: |
        provider:
          name: cloudflare
        sources:
          - gateway-httproute
        domainFilters:
          - arguswatcher.net
        policy: upsert-only
        registry: txt
        txtOwnerId: multi-tenant-eks-dev
        txtPrefix: "extdns-"
        env:
          - name: CF_API_TOKEN
            valueFrom:
              secretKeyRef:
                name: cloudflare-api-token
                key: api-token
        extraArgs:
          - --cloudflare-dns-records-per-page=1000
        serviceAccount:
          create: true
          name: external-dns
        rbac:
          create: true
        resources:
          requests:
            cpu: 20m
            memory: 64Mi
          limits:
            memory: 128Mi
        tolerations:
          - key: workload-class
            operator: Equal
            value: platform
            effect: NoSchedule
  destination:
    server: https://kubernetes.default.svc
    namespace: external-dns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
