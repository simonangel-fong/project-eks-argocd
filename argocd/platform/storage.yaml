apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-storage
  namespace: argocd
  labels:
    scope: platform
    capability: storage
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
  finalizers:
    - argocd.argoproj.io/resources-finalizer
spec:
  project: platform
  source:
    repoURL: https://github.com/simonangel-fong/project-eks-argocd
    targetRevision: master
    path: argocd/platform-capabilities/storage
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
