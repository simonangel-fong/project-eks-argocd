apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-probes
  annotations:
    policies.kyverno.io/title: Require liveness and readiness probes
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/description: >-
      Every long-running container must declare liveness and readiness probes.
      Enables safe rollouts (kubelet won't send traffic before ready) and
      self-healing (unhealthy pods are restarted).
    # Init containers run once and exit — probes don't apply. Kyverno's
    # default autogen would generate rules that also check initContainers,
    # blocking legitimate init containers like Flyway. Disable autogen
    # for this policy; the Pod-level rule (which walks spec.containers only)
    # is sufficient because Kubernetes will call our webhook when Pods
    # are created by any controller.
    pod-policies.kyverno.io/autogen-controllers: none
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-liveness-readiness
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - karpenter
                - istio-system
                - istio-ingress
                - cert-manager
                - argocd
                - external-dns
                - external-secrets
                - monitoring
                - kyverno
                - argo-rollouts
          - resources:
              kinds:
                - Job
                - CronJob
      validate:
        message: "Every container must declare `livenessProbe` and `readinessProbe`."
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.containers[?livenessProbe == null] | length(@) }}"
                operator: GreaterThan
                value: 0
              - key: "{{ request.object.spec.containers[?readinessProbe == null] | length(@) }}"
                operator: GreaterThan
                value: 0
