apiVersion: v1
kind: Namespace
metadata:
  name: team-b
  labels:
    team: team-b
    # Enroll the namespace in Istio ambient. ztunnel (istio-system DaemonSet)
    # transparently encrypts pod traffic with mTLS — no sidecars, no pod restarts.
    istio.io/dataplane-mode: ambient
---
# Enforce mTLS for all workloads in the namespace. Ambient encrypts by default;
# STRICT rejects any plaintext peer that bypasses ztunnel.
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: default
  namespace: team-b
spec:
  mtls:
    mode: STRICT
---
# Default-deny — every pod-to-pod path is blocked until an allow rule opens it.
# NetworkPolicy is L3/L4 and complements ambient's mTLS: ambient handles identity
# and encryption, NP handles reachability.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: team-b
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
# Companion allow — restores inbound from the shared Gateway and outbound to
# kube-dns. Without this, default-deny breaks tenant ingress on day one.
# Ambient additions:
#   - ingress from istio-system covers ztunnel/waypoint traffic
#   - 169.254.7.127/32 is the link-local address ambient SNATs kubelet probes
#     to; without this, HTTP probes on web/api time out (Postgres uses exec
#     probes so it's unaffected)
#   - TCP 15008 (HBONE) carries ambient pod-to-pod mTLS between namespaces
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-platform-ingress-and-dns
  namespace: team-b
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-ingress
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
    - from:
        - ipBlock:
            cidr: 169.254.7.127/32
    - from:
        - ipBlock:
            cidr: 10.0.0.0/16
    - from:
        - namespaceSelector: {}
      ports:
        - { protocol: TCP, port: 15008 }
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
    - to:
        - podSelector: {}
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: baseline
  namespace: team-b
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    persistentvolumeclaims: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: baseline
  namespace: team-b
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: team-b
  namespace: argocd
  labels:
    scope: tenant
    team: team-b
  finalizers:
    - argocd.argoproj.io/resources-finalizer
spec:
  project: team-b
  source:
    repoURL: https://github.com/simonangel-fong/project-eks-argocd
    targetRevision: master
    path: demo-app/team-b/chart
    helm:
      releaseName: todo
      valuesObject:
        global:
          host: team-b.arguswatcher.net
          team: team-b
        db:
          image:
            # docker.io/* Kyverno pattern doesn't cross `/`, so `library/postgres` is rejected.
            repository: docker.io/postgres
  destination:
    server: https://kubernetes.default.svc
    namespace: team-b
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
