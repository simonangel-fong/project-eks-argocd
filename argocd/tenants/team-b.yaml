apiVersion: v1
kind: Namespace
metadata:
  name: team-b
  labels:
    team: team-b
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: team-b
  namespace: argocd
  finalizers:
    - argocd.argoproj.io/resources-finalizer
spec:
  project: team-b
  source:
    repoURL: https://github.com/simonangel-fong/project-eks-argocd
    targetRevision: master
    path: demo-app/team-b/chart
    helm:
      releaseName: todo
      valuesObject:
        global:
          host: team-b.arguswatcher.net
          team: team-b
        db:
          image:
            # docker.io/* Kyverno pattern doesn't cross `/`, so `library/postgres` is rejected.
            repository: docker.io/postgres
  destination:
    server: https://kubernetes.default.svc
    namespace: team-b
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
