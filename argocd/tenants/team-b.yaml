apiVersion: v1
kind: Namespace
metadata:
  name: team-b
  labels:
    team: team-b
    # Ambient mTLS disabled — see docs/security.md "Ambient experiment".
    # Enroll again once a Waypoint proxy is deployed for the namespace.
    # istio.io/dataplane-mode: ambient
---
# Default-deny — every pod-to-pod path is blocked until an allow rule opens it.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: team-b
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
# Companion allow — restores inbound from the shared Gateway and outbound to
# kube-dns. Without this, default-deny breaks tenant ingress on day one.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-platform-ingress-and-dns
  namespace: team-b
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-ingress
    # Kubelet probes originate from the node's host IP, which has no
    # namespace/pod selector. Allow the VPC CIDR so probes reach the pod.
    - from:
        - ipBlock:
            cidr: 10.0.0.0/16
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
    - to:
        - podSelector: {}
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: baseline
  namespace: team-b
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    persistentvolumeclaims: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: baseline
  namespace: team-b
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: team-b
  namespace: argocd
  labels:
    scope: tenant
    team: team-b
  finalizers:
    - argocd.argoproj.io/resources-finalizer
spec:
  project: team-b
  source:
    repoURL: https://github.com/simonangel-fong/project-eks-argocd
    targetRevision: master
    path: demo-app/team-b/chart
    helm:
      releaseName: todo
      valuesObject:
        global:
          host: team-b.arguswatcher.net
          team: team-b
        db:
          image:
            # docker.io/* Kyverno pattern doesn't cross `/`, so `library/postgres` is rejected.
            repository: docker.io/postgres
  destination:
    server: https://kubernetes.default.svc
    namespace: team-b
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
