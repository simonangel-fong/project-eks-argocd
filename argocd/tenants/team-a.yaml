apiVersion: v1
kind: Namespace
metadata:
  name: team-a
  labels:
    team: team-a
    # Enroll the namespace in Istio ambient. ztunnel (istio-system DaemonSet)
    # transparently encrypts pod traffic with mTLS — no sidecars, no pod restarts.
    istio.io/dataplane-mode: ambient
---
# Enforce mTLS for all workloads in the namespace. Ambient encrypts by default;
# STRICT rejects any plaintext peer that bypasses ztunnel.
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: default
  namespace: team-a
spec:
  mtls:
    mode: STRICT
---
# Default-deny — every pod-to-pod path is blocked until an allow rule opens it.
# NetworkPolicy is L3/L4 and complements ambient's mTLS: ambient handles identity
# and encryption, NP handles reachability.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: team-a
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
# Companion allow — restores inbound from the shared Gateway and outbound to
# kube-dns. Without this, default-deny breaks tenant ingress on day one.
# Ambient additions:
#   - ingress from istio-system covers ztunnel/waypoint traffic (HBONE 15008)
#   - the existing VPC CIDR rule already lets node-local ztunnel reach the pod
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-platform-ingress-and-dns
  namespace: team-a
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-ingress
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
    # Ambient SNATs kubelet probes to a link-local address before delivery so
    # ztunnel can identify and skip mTLS on them. NetworkPolicy evaluates the
    # post-SNAT source, so the VPC CIDR rule no longer covers probes — this
    # link-local allow is required, or all probes fail with a timeout.
    # https://istio.io/latest/docs/ambient/usage/networkpolicy/
    - from:
        - ipBlock:
            cidr: 169.254.7.127/32
    # Kubelet probes originate from the node's host IP for non-ambient paths;
    # keep the VPC CIDR allow so probes still work if a pod exits ambient.
    - from:
        - ipBlock:
            cidr: 10.0.0.0/16
    # HBONE — ambient pod-to-pod mTLS tunnel. Without this, east-west traffic
    # from other ambient namespaces is silently dropped by default-deny even
    # though probes now pass.
    - from:
        - namespaceSelector: {}
      ports:
        - { protocol: TCP, port: 15008 }
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
    # Egress to istio-system for ztunnel xDS / HBONE upstream to waypoints.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
    - to:
        - podSelector: {}
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: baseline
  namespace: team-a
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    persistentvolumeclaims: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: baseline
  namespace: team-a
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: team-a
  namespace: argocd
  labels:
    scope: tenant
    team: team-a
  finalizers:
    - argocd.argoproj.io/resources-finalizer
spec:
  project: team-a
  source:
    repoURL: https://github.com/simonangel-fong/project-eks-argocd
    targetRevision: master
    path: demo-app/team-a
  destination:
    server: https://kubernetes.default.svc
    namespace: team-a
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
