apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
  annotations:
    policies.kyverno.io/title: Disallow :latest tag
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/description: >-
      Prevents images without an explicit tag or with the `:latest` tag.
      Ensures reproducible deploys and unambiguous rollbacks.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-image-tag
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - karpenter
                - istio-system
                - istio-ingress
                - cert-manager
                - argocd
                - external-dns
                - external-secrets
                - monitoring
                - kyverno
                - argo-rollouts
      validate:
        message: "Image tag is required (no `:latest`, no untagged)."
        pattern:
          spec:
            containers:
              - image: "*:*"
    - name: disallow-latest-tag
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - karpenter
                - istio-system
                - istio-ingress
                - cert-manager
                - argocd
                - external-dns
                - external-secrets
                - monitoring
                - kyverno
                - argo-rollouts
      validate:
        message: "Image tag `:latest` is not allowed — use an immutable tag."
        pattern:
          spec:
            containers:
              - image: "!*:latest"
