# Platform-provided analysis template. Teams reference this by name from
# any namespace via templateName + clusterScope: true.
#
# Args:
#   service    — canary service name (Kubernetes Service, workload_canonical_service in Istio)
#   namespace  — service namespace
#   threshold  — required success rate percent (e.g. "99")
#   interval   — evaluation cadence (default 30s)
#
# Metric source: Istio ambient's istio_requests_total, emitted by ztunnel.
apiVersion: argoproj.io/v1alpha1
kind: ClusterAnalysisTemplate
metadata:
  name: success-rate
spec:
  args:
    - name: service
    - name: namespace
    - name: threshold
      value: "99"
    - name: interval
      value: "30s"
  metrics:
    - name: success-rate
      interval: "{{args.interval}}"
      count: 5
      successCondition: result[0] >= {{args.threshold}}
      failureLimit: 2
      provider:
        prometheus:
          address: http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
          query: |
            100 * (
              sum(rate(istio_requests_total{
                destination_service_name="{{args.service}}",
                destination_service_namespace="{{args.namespace}}",
                response_code!~"5.."
              }[2m]))
              /
              sum(rate(istio_requests_total{
                destination_service_name="{{args.service}}",
                destination_service_namespace="{{args.namespace}}"
              }[2m]))
            )
