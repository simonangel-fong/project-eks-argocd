apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secretsmanager
  target:
    name: cloudflare-api-token
    creationPolicy: Owner
  data:
    - secretKey: apiToken
      remoteRef:
        key: voting-dev/cloudflare-api-token
        property: apiToken
