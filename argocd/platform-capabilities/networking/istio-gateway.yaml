apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-istio-gateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-11"
  finalizers:
    - argocd.argoproj.io/resources-finalizer
spec:
  project: platform
  source:
    repoURL: https://github.com/simonangel-fong/project-eks-argocd
    targetRevision: master
    path: argocd/platform-capabilities/networking/istio-gateway
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-ingress
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
