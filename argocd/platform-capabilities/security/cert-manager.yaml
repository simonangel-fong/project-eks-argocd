apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-cert-manager
  namespace: argocd
  labels:
    scope: platform
    capability: security
  annotations:
    argocd.argoproj.io/sync-wave: "30"
  finalizers:
    - argocd.argoproj.io/resources-finalizer
spec:
  project: platform
  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    targetRevision: v1.21.0
    helm:
      releaseName: cert-manager
      values: |
        crds:
          enabled: true
        global:
          leaderElection:
            namespace: cert-manager
        replicaCount: 2
        podDisruptionBudget:
          enabled: true
          minAvailable: 1
        tolerations:
          - key: workload-class
            operator: Equal
            value: platform
            effect: NoSchedule
        webhook:
          replicaCount: 2
          podDisruptionBudget:
            enabled: true
            minAvailable: 1
          tolerations:
            - key: workload-class
              operator: Equal
              value: platform
              effect: NoSchedule
        cainjector:
          replicaCount: 2
          podDisruptionBudget:
            enabled: true
            minAvailable: 1
          tolerations:
            - key: workload-class
              operator: Equal
              value: platform
              effect: NoSchedule
        startupapicheck:
          tolerations:
            - key: workload-class
              operator: Equal
              value: platform
              effect: NoSchedule
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
