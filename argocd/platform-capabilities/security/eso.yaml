apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-eso
  namespace: argocd
  labels:
    scope: platform
    capability: security
  annotations:
    argocd.argoproj.io/sync-wave: "30"
  finalizers:
    - argocd.argoproj.io/resources-finalizer
spec:
  project: platform
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 2.7.0
    helm:
      releaseName: external-secrets
      values: |
        installCRDs: true
        replicaCount: 2
        podDisruptionBudget:
          enabled: true
          minAvailable: 1
        tolerations:
          - key: workload-class
            operator: Equal
            value: platform
            effect: NoSchedule
        webhook:
          replicaCount: 2
          podDisruptionBudget:
            enabled: true
            minAvailable: 1
          tolerations:
            - key: workload-class
              operator: Equal
              value: platform
              effect: NoSchedule
        certController:
          replicaCount: 2
          podDisruptionBudget:
            enabled: true
            minAvailable: 1
          tolerations:
            - key: workload-class
              operator: Equal
              value: platform
              effect: NoSchedule
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
