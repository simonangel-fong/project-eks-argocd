apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-kyverno
  namespace: argocd
  labels:
    scope: platform
    capability: security
  annotations:
    argocd.argoproj.io/sync-wave: "30"
  finalizers:
    - argocd.argoproj.io/resources-finalizer
spec:
  project: platform
  source:
    repoURL: https://kyverno.github.io/kyverno/
    chart: kyverno
    targetRevision: 3.8.2
    helm:
      releaseName: kyverno
      values: |
        admissionController:
          replicas: 2
          podDisruptionBudget:
            enabled: true
            minAvailable: 1
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 512Mi
          tolerations:
            - key: workload-class
              operator: Equal
              value: platform
              effect: NoSchedule
        backgroundController:
          replicas: 1
          tolerations:
            - key: workload-class
              operator: Equal
              value: platform
              effect: NoSchedule
        reportsController:
          replicas: 1
          tolerations:
            - key: workload-class
              operator: Equal
              value: platform
              effect: NoSchedule
        cleanupController:
          replicas: 1
          tolerations:
            - key: workload-class
              operator: Equal
              value: platform
              effect: NoSchedule
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jqPathExpressions:
        - .metadata.annotations
        - .metadata.labels
        - .spec.conversion
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jqPathExpressions:
        - .webhooks[].failurePolicy
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      jqPathExpressions:
        - .webhooks[].failurePolicy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
