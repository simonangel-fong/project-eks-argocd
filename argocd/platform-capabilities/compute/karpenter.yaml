apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-karpenter
  namespace: argocd
  labels:
    scope: platform
    capability: compute
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
  finalizers:
    - argocd.argoproj.io/resources-finalizer
spec:
  project: platform
  source:
    repoURL: public.ecr.aws/karpenter
    chart: karpenter
    targetRevision: 1.6.0
    helm:
      releaseName: karpenter
      values: |
        nodeSelector:
          karpenter.sh/controller: "true"
        dnsPolicy: Default
        replicas: 1
        settings:
          clusterName: multi-tenant-eks-dev
          interruptionQueue: Karpenter-multi-tenant-eks-dev
        webhook:
          enabled: false
        serviceAccount:
          create: true
          name: karpenter
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false
