# Reference dashboard for platform overview. Establishes the ConfigMap
# convention: `grafana_dashboard: "1"` triggers sidecar discovery;
# `grafana_folder` annotation places it in a named folder.
apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-overview-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: Platform
data:
  platform-overview.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "graphTooltip": 0,
      "panels": [
        {
          "type": "stat",
          "title": "Nodes",
          "targets": [{"expr": "count(kube_node_info)", "refId": "A"}],
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "id": 1
        },
        {
          "type": "stat",
          "title": "Pods running",
          "targets": [{"expr": "sum(kube_pod_status_phase{phase=\"Running\"})", "refId": "A"}],
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
          "id": 2
        },
        {
          "type": "stat",
          "title": "ArgoCD Apps healthy",
          "targets": [{"expr": "count(argocd_app_info{health_status=\"Healthy\"})", "refId": "A"}],
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
          "id": 3
        },
        {
          "type": "stat",
          "title": "Firing alerts",
          "targets": [{"expr": "sum(ALERTS{alertstate=\"firing\"})", "refId": "A"}],
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0},
          "id": 4
        },
        {
          "type": "timeseries",
          "title": "Cluster CPU usage",
          "targets": [{"expr": "sum(rate(container_cpu_usage_seconds_total{image!=\"\"}[5m]))", "refId": "A"}],
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
          "id": 5
        },
        {
          "type": "timeseries",
          "title": "Cluster memory usage",
          "targets": [{"expr": "sum(container_memory_working_set_bytes{image!=\"\"})", "refId": "A"}],
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
          "id": 6
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["platform"],
      "time": {"from": "now-6h", "to": "now"},
      "timezone": "browser",
      "title": "Platform Overview",
      "uid": "platform-overview",
      "version": 1
    }
