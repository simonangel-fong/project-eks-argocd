apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Cluster add-ons (ALBC, Karpenter)
  sourceRepos:
    - https://github.com/simonangel-fong/project-eks-argocd
    - https://aws.github.io/eks-charts
    - public.ecr.aws/karpenter
  destinations:
    - server: https://kubernetes.default.svc
      namespace: '*'
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
