global:
  host: todo.arguswatcher.net
  image:
    repository: simonangelfong/todo-app

db:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
  name: todo
  user: todo
  password: "mypassword!098"
  storage:
    className: gp3-iops
    size: 5Gi
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }

api:
  enabled: true
  image:
    tag: api-v1
  replicas: 2
  port: 3000
  resources:
    requests: { cpu: 50m,  memory: 128Mi }
    limits:   { cpu: 300m, memory: 256Mi }
  canary:
    steps:
      - setWeight: 20
      - pause: { duration: 60s }
      - analysis:
          templates:
            - templateName: todo-api-success-rate
      - setWeight: 50
      - pause: { duration: 60s }
      - setWeight: 100

web:
  enabled: true
  image:
    tag: web-v1
  replicas: 2
  port: 8080
  resources:
    requests: { cpu: 50m,  memory: 64Mi }
    limits:   { cpu: 200m, memory: 128Mi }
  canary:
    steps:
      - setWeight: 20
      - pause: { duration: 60s }
      - setWeight: 50
      - pause: { duration: 60s }
      - setWeight: 100

istio:
  enabled: true
  gateway: todo-gateway

analysis:
  prometheus:
    address: http://prometheus.monitoring:9090
    successRateThreshold: "0.95"
