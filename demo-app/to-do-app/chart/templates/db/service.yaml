{{- if .Values.db.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: todo-db
  labels:
    {{- include "todo.commonLabels" . | nindent 4 }}
    app.kubernetes.io/component: db
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/component: db
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
{{- end }}
