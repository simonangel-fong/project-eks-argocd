apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: web
  namespace: team-a
  labels:
    team: team-a
    app: web
spec:
  parentRefs:
    - name: istio-ingress
      namespace: istio-ingress
  hostnames:
    - team-a.arguswatcher.net
  rules:
    - backendRefs:
        - name: web
          port: 80
