global:
  host: team-b.arguswatcher.net
  team: todo
  image:
    repository: docker.io/simonangelfong/todo-app

db:
  enabled: true
  image:
    repository: docker.io/library/postgres
    tag: "16-alpine"
  name: todo
  user: todo
  password: "mypassword!098"
  storage:
    className: gp3-iops
    size: 20Gi
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }
  nodeSelector:
    workload-class: database
  tolerations:
    - key: workload-class
      operator: Equal
      value: database
      effect: NoSchedule

api:
  enabled: true
  image:
    tag: api-v1
  replicas: 2
  port: 3000
  resources:
    requests: { cpu: 50m,  memory: 128Mi }
    limits:   { cpu: 300m, memory: 256Mi }
  nodeSelector:
    workload-class: general
  pdb:
    enabled: true
    minAvailable: 1

web:
  enabled: true
  image:
    tag: web-v1
  replicas: 2
  port: 8080
  resources:
    requests: { cpu: 50m,  memory: 64Mi }
    limits:   { cpu: 200m, memory: 128Mi }
  nodeSelector:
    workload-class: general
  pdb:
    enabled: true
    minAvailable: 1

gatewayApi:
  enabled: true
  parentRef:
    name: istio-ingress
    namespace: istio-ingress
    sectionName: https
