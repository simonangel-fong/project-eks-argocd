{{- if .Values.gatewayApi.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: todo-api
  labels:
    {{- include "todo.commonLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  parentRefs:
    - name: {{ .Values.gatewayApi.parentRef.name }}
      namespace: {{ .Values.gatewayApi.parentRef.namespace }}
      sectionName: {{ .Values.gatewayApi.parentRef.sectionName | quote }}
  hostnames:
    - {{ .Values.global.host | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/
      backendRefs:
        - name: todo-api
          port: 80
          weight: 100
        - name: todo-api-canary
          port: 80
          weight: 0
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: todo-web
  labels:
    {{- include "todo.commonLabels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.gatewayApi.parentRef.name }}
      namespace: {{ .Values.gatewayApi.parentRef.namespace }}
      sectionName: {{ .Values.gatewayApi.parentRef.sectionName | quote }}
  hostnames:
    - {{ .Values.global.host | quote }}
  rules:
    - backendRefs:
        - name: todo-web
          port: 80
          weight: 100
        - name: todo-web-canary
          port: 80
          weight: 0
{{- end }}
