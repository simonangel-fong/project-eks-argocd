{{- if .Values.api.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: todo-api
  labels:
    {{- include "todo.commonLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  strategy:
    canary:
      canaryService: todo-api-canary
      stableService: todo-api
      trafficRouting:
        plugins:
          argoproj-labs/gatewayAPI:
            httpRoute:
              name: todo-api
              namespace: {{ .Release.Namespace }}
      steps:
        {{- toYaml .Values.api.canary.steps | nindent 8 }}
  selector:
    matchLabels:
      app.kubernetes.io/component: api
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "todo.commonLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      {{- with .Values.api.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.global.image.repository }}:{{ .Values.api.image.tag }}"
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.api.port | quote }}
            - name: PGHOST
              value: todo-db
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              valueFrom: { secretKeyRef: { name: todo-db, key: POSTGRES_DB } }
            - name: PGUSER
              valueFrom: { secretKeyRef: { name: todo-db, key: POSTGRES_USER } }
            - name: PGPASSWORD
              valueFrom: { secretKeyRef: { name: todo-db, key: POSTGRES_PASSWORD } }
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources: {{- toYaml .Values.api.resources | nindent 12 }}
{{- end }}
