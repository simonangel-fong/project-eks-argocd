services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: todo
      POSTGRES_DB: todo
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    environment:
      PGHOST: db
      PGPORT: "5432"
      PGUSER: todo
      PGPASSWORD: todo
      PGDATABASE: todo
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./web
    ports:
      - "8080:8080"
    depends_on:
      - api
