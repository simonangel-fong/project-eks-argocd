apiVersion: v1
kind: Service
metadata:
  name: todo
  namespace: team-b
  labels:
    team: team-b
    app: todo
spec:
  selector:
    app: todo
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo
  namespace: team-b
  labels:
    team: team-b
    app: todo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: todo
  template:
    metadata:
      labels:
        team: team-b
        app: todo
    spec:
      containers:
        - name: todo
          image: docker.io/nginx:1.27
          ports:
            - containerPort: 80
              name: http
          env:
            - name: DB_HOST
              value: postgres.team-b.svc.cluster.local
            - name: DB_PORT
              value: "5432"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
          livenessProbe:
            httpGet:
              path: /
              port: http
