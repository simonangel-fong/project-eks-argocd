apiVersion: v1
kind: Pod
metadata:
  name: {{ include "voting-app.api.fullname" . }}-test
  labels:
    {{- include "voting-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:latest
      command: ["/bin/sh", "-c"]
      args:
        - >
          curl -fsS --max-time 10
          --retry 5 --retry-connrefused --retry-delay 2
          http://{{ include "voting-app.api.fullname" . }}:{{ .Values.service.port }}/readyz
