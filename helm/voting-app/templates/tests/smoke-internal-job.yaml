{{- if .Values.tests.smoke.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "voting-app.api.fullname" . }}-smoke-internal
  labels:
    {{- include "voting-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  activeDeadlineSeconds: 120
  template:
    metadata:
      labels:
        {{- include "voting-app.labels" . | nindent 8 }}
        app.kubernetes.io/component: test
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-api
          image: curlimages/curl:latest
          command: ["/bin/sh", "-c"]
          args:
            - >
              until curl -fsS --max-time 5
              http://{{ include "voting-app.api.fullname" . }}:{{ .Values.service.port }}/readyz;
              do echo "waiting for api"; sleep 2; done
      containers:
        - name: k6
          image: {{ .Values.tests.k6.image }}
          args: ["run", "/scripts/smoke.js"]
          env:
            - name: TARGET_URL
              value: "http://{{ include "voting-app.api.fullname" . }}:{{ .Values.service.port }}"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
      volumes:
        - name: scripts
          configMap:
            name: {{ include "voting-app.api.fullname" . }}-k6-scripts
{{- end }}
