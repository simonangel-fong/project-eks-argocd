{{- if .Values.tests.load.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "voting-app.api.fullname" . }}-load
  labels:
    {{- include "voting-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 3600
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        {{- include "voting-app.labels" . | nindent 8 }}
        app.kubernetes.io/component: test
    spec:
      restartPolicy: Never
      containers:
        - name: k6
          image: {{ .Values.tests.k6.image }}
          args: ["run", "/scripts/load.js"]
          env:
            - name: TARGET_URL
              value: {{ .Values.tests.load.targetUrl | quote }}
          volumeMounts:
            - name: scripts
              mountPath: /scripts
          resources:
            requests:
              cpu: 200m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 256Mi
      volumes:
        - name: scripts
          configMap:
            name: {{ include "voting-app.api.fullname" . }}-k6-scripts
{{- end }}
