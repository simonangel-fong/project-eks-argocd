{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "voting-app.api.fullname" . }}
  labels:
    {{- include "voting-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ include "voting-app.gateway.parentRefName" . }}
      {{- with .Values.gateway.parentRef.namespace }}
      namespace: {{ . }}
      {{- end }}
      sectionName: http
  hostnames:
    - {{ .Values.gateway.host | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: {{ include "voting-app.api.fullname" . }}
          port: {{ .Values.service.port }}
          weight: 1
{{- end }}
